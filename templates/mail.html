{% extends "layout.html" %}

{% block content %}
<style>
    .mail-container {
        display: flex;
        height: calc(100vh - 120px);
    }

    .mail-sidebar {
        width: 250px;
        min-width: 200px;
        max-width: 350px;
        flex-shrink: 0;
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        padding: 1rem;
        display: flex;
        flex-direction: column;
        position: relative;
        height: 100%;
    }

    .mail-main-wrapper {
        flex: 1;
        display: flex;
        min-width: 300px;
    }

    .mail-main {
        flex: 1;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        overflow: hidden;
        margin-left: 1rem;
    }

    /* 可拖动分隔条 */
    .mail-resizer {
        width: 6px;
        background: transparent;
        cursor: col-resize;
        position: relative;
        flex-shrink: 0;
        margin: 0 0.5rem;
        border-radius: 3px;
        transition: background 0.2s;
    }

    .mail-resizer:hover,
    .mail-resizer.dragging {
        background: var(--primary);
    }

    .mail-resizer::before {
        content: '';
        position: absolute;
        left: -4px;
        right: -4px;
        top: 0;
        bottom: 0;
    }

    .mail-detail-panel {
        width: 450px;
        min-width: 300px;
        max-width: 800px;
        flex-shrink: 0;
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .detail-panel-header {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
    }

    .detail-panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
    }

    /* Gmail-style 3-column layout */
    .mail-container.detail-closed .mail-resizer,
    .mail-container.detail-closed .mail-detail-panel {
        display: none;
    }

    .mail-sidebar-header {
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1rem;
    }

    .compose-btn {
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s;
    }

    .compose-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .folder-list {
        list-style: none;
        padding: 0;
        margin: 0;
        flex: 1;
    }

    .folder-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 0.25rem;
    }

    .folder-item:hover {
        background: var(--bg-hover);
    }

    .folder-item.active {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
        color: var(--primary);
    }

    .folder-item svg {
        width: 20px;
        height: 20px;
        margin-right: 0.75rem;
    }

    .folder-badge {
        margin-left: auto;
        background: var(--primary);
        color: white;
        font-size: 0.75rem;
        padding: 0.125rem 0.5rem;
        border-radius: 10px;
    }

    .mail-main {
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }

    .mail-toolbar {
        display: flex;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        gap: 0.75rem;
    }

    .mail-toolbar input[type="text"] {
        flex: 1;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-main);
        color: var(--text-main);
    }

    .toolbar-btn {
        padding: 0.5rem 1rem;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        transition: all 0.2s;
    }

    .toolbar-btn:hover {
        background: var(--bg-hover);
    }

    .toolbar-btn svg {
        width: 18px;
        height: 18px;
    }

    .mail-list {
        flex: 1;
        overflow-y: auto;
    }

    .mail-item {
        display: grid;
        grid-template-columns: 200px 1fr 120px;
        gap: 1rem;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
    }

    .mail-item:hover {
        background: var(--bg-hover);
    }

    .mail-item.unread {
        font-weight: 600;
    }

    .mail-sender {
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mail-subject {
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .mail-preview {
        color: var(--text-muted);
        font-size: 0.85rem;
        white-space: normal;
        word-break: break-word;
        max-height: 4.5em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
    }

    .mail-date {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: right;
    }

    .mail-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 300px;
        color: var(--text-muted);
    }

    .mail-empty svg {
        width: 64px;
        height: 64px;
        margin-bottom: 1rem;
        opacity: 0.5;
    }

    .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 1px solid var(--border);
    }

    .pagination button {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        background: var(--card-bg);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s;
    }

    .pagination button:hover:not(:disabled) {
        background: var(--bg-hover);
    }

    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .pagination span {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    /* Gmail-style Compose Panel - Right Side */
    .compose-panel {
        display: none;
        position: fixed;
        bottom: 0;
        right: 1rem;
        width: 480px;
        min-width: 320px;
        max-width: calc(100vw - 2rem);
        height: 500px;
        min-height: 300px;
        max-height: calc(100vh - 4rem);
        background: var(--card-bg);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        flex-direction: column;
        overflow: hidden;
        resize: both;
    }

    .compose-panel.active {
        display: flex;
        animation: slideUp 0.2s ease-out;
    }

    /* Resize handle indicator */
    .compose-panel::after {
        content: '';
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 12px;
        height: 12px;
        background: linear-gradient(135deg, transparent 50%, var(--text-muted) 50%);
        pointer-events: none;
        opacity: 0.5;
    }

    /* Drag drop zone */
    .drop-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(99, 102, 241, 0.1);
        border: 2px dashed #6366F1;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
        pointer-events: none;
    }

    .drop-zone.active {
        display: flex;
    }

    .drop-zone-text {
        font-size: 1.1rem;
        color: #6366F1;
        font-weight: 500;
    }

    .compose-panel-body.drag-over {
        position: relative;
    }

    @keyframes slideUp {
        from {
            transform: translateY(100%);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .compose-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        background: linear-gradient(135deg, #404040 0%, #2d2d2d 100%);
        color: white;
        cursor: move;
    }

    .compose-panel-header h3 {
        font-size: 0.95rem;
        font-weight: 500;
        margin: 0;
    }

    .compose-panel-actions {
        display: flex;
        align-items: center;
        gap: 0.25rem;
    }

    .compose-panel-btn {
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.2s;
    }

    .compose-panel-btn:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .compose-panel-body {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .compose-field {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--border);
        min-height: 42px;
    }

    .compose-field-label {
        width: 60px;
        font-size: 0.85rem;
        color: var(--text-muted);
        flex-shrink: 0;
    }

    .compose-field input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 0.9rem;
        color: var(--text-main);
        outline: none;
    }

    .compose-field input::placeholder {
        color: var(--text-muted);
    }

    .compose-body-wrapper {
        flex: 1;
        padding: 0.75rem 1rem;
        min-height: 200px;
    }

    .compose-body-wrapper textarea {
        width: 100%;
        height: 100%;
        min-height: 200px;
        border: none;
        background: transparent;
        font-size: 0.9rem;
        color: var(--text-main);
        resize: none;
        outline: none;
        line-height: 1.5;
    }

    .compose-body-wrapper textarea::placeholder {
        color: var(--text-muted);
    }

    .compose-attachments {
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--border);
        display: none;
    }

    .compose-attachments.has-files {
        display: block;
    }

    .attachment-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .attachment-item {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.75rem;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.8rem;
    }

    .attachment-item .remove {
        cursor: pointer;
        opacity: 0.5;
        font-size: 1rem;
    }

    .attachment-item .remove:hover {
        opacity: 1;
    }

    .compose-panel-footer {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-top: 1px solid var(--border);
        background: var(--bg-main);
        gap: 0.5rem;
    }

    .btn-send {
        padding: 0.5rem 1.5rem;
        background: linear-gradient(135deg, #0b57d0 0%, #0842a0 100%);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-send:hover {
        box-shadow: 0 2px 8px rgba(11, 87, 208, 0.3);
    }

    .btn-attachment {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .btn-attachment:hover {
        background: var(--bg-hover);
        color: var(--text-main);
    }

    .btn-delete-draft {
        margin-left: auto;
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .btn-delete-draft:hover {
        background: #fef2f2;
        color: #EF4444;
    }

    /* CC/BCC Toggle */
    .field-toggle {
        font-size: 0.75rem;
        color: var(--primary);
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: var(--radius);
        transition: background 0.2s;
    }

    .field-toggle:hover {
        background: var(--bg-hover);
    }

    .compose-field.hidden {
        display: none;
    }

    .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-main);
    }

    .modal-close {
        width: 32px;
        height: 32px;
        border: none;
        background: none;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .modal-close:hover {
        background: var(--bg-hover);
        color: var(--text-main);
    }

    .modal-body {
        padding: 1.5rem;
        overflow-y: auto;
        flex: 1;
    }

    .form-group {
        margin-bottom: 1rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #fff;
        font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-main);
        color: var(--text-main);
        font-size: 0.9rem;
    }

    .form-group textarea {
        min-height: 200px;
        resize: vertical;
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
    }

    .btn {
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
        color: white;
        border: none;
    }

    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-secondary {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border);
    }

    .btn-secondary:hover {
        background: var(--bg-hover);
    }

    /* Email Detail */
    .email-detail-header {
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
        margin-bottom: 1rem;
    }

    .email-detail-subject {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 0.75rem;
    }

    .email-detail-meta {
        display: flex;
        gap: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .email-detail-body {
        color: var(--text-main);
        line-height: 1.6;
        white-space: pre-wrap;
    }

    .email-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
    }

    /* Relations Section */
    .relations-section {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
    }

    .relations-section h4 {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
    }

    .relation-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .relation-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.75rem;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.85rem;
    }

    .relation-tag .remove {
        cursor: pointer;
        opacity: 0.5;
    }

    .relation-tag .remove:hover {
        opacity: 1;
    }

    .add-relation-form {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
    }

    .add-relation-form select {
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-main);
        color: var(--text-main);
    }

    /* Sync Progress Bar */
    .sync-progress-container {
        position: relative;
        width: 100%;
        max-width: 200px;
    }

    .sync-progress-bar {
        width: 100%;
        height: 6px;
        background: var(--bg-main);
        border-radius: 3px;
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .sync-progress-bar.active {
        opacity: 1;
    }

    .sync-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #6366F1 0%, #8B5CF6 100%);
        border-radius: 3px;
        transition: width 0.3s ease;
    }

    .sync-progress-text {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 2px;
        text-align: center;
    }

    /* Sync Status */
    .sync-status {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .sync-status.syncing {
        color: var(--primary);
    }

    .sync-status.error {
        color: #EF4444;
    }

    .sync-status.error .sync-progress-fill {
        background: #EF4444;
    }

    .settings-link {
        position: absolute;
        bottom: 1rem;
        left: 1rem;
        right: 1rem;
    }

    .settings-link a {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: var(--text-muted);
        text-decoration: none;
        border-radius: var(--radius);
        transition: all 0.2s;
    }

    .settings-link a:hover {
        background: var(--bg-hover);
        color: var(--text-main);
    }
</style>

<div class="page-header">
    <h1>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        邮件中心
    </h1>
    <div class="sync-status" id="syncStatus">
        <div class="sync-progress-container">
            <div class="sync-progress-bar" id="syncProgressBar">
                <div class="sync-progress-fill" id="syncProgressFill"></div>
            </div>
            <div class="sync-progress-text" id="syncProgressText"></div>
        </div>
        <span id="syncText">就绪</span>
    </div>
</div>

<div class="mail-container">
    <!-- Sidebar -->
    <div class="mail-sidebar">
        <div class="mail-sidebar-header">
            <div class="current-email" style="padding: 0.5rem 0; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border);">
                <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">当前邮箱</div>
                <div style="font-size: 0.85rem; color: var(--text-main); font-weight: 500; word-break: break-all;">{{ current_email or '未配置' }}</div>
            </div>
            <button class="compose-btn" onclick="openComposePanel()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                写邮件
            </button>
        </div>
        <ul class="folder-list">
            <li class="folder-item active" data-folder="inbox" onclick="switchFolder('inbox')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                收件箱
                <span class="folder-badge" id="inboxBadge">0</span>
            </li>
            <li class="folder-item" data-folder="sent" onclick="switchFolder('sent')">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
                已发送
            </li>
        </ul>
        <div class="settings-link">
            <a href="#" onclick="openSettingsModal(event)">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">

<script>
    // State
    let currentFolder = 'inbox';
    let currentPage = 1;
    let currentMailId = null;
    let clients = [];
    let orders = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadInboxCount();
        loadEmails();
        loadClients();
        loadOrders();
        loadSettings();
        initComposePanelDrag();
        initComposePanelResize();
        initDragDropAttachments();
        initPasteAttachments();
        initDetailPanelResizer();
    });

    // Load emails
    async function loadEmails() {
        const folder = currentFolder; // 'inbox' or 'sent'
        const search = document.getElementById('searchInput').value;

        try {
            const response = await fetch(`/api/mail/list?folder=${folder}&page=${currentPage}&page_size=20${search ? '&search=' + encodeURIComponent(search) : ''}`);
            const data = await response.json();

            renderEmailList(data.items);
            renderPagination(data);
            updateBadge(data.total_count);
        } catch (error) {
            console.error('Load emails error:', error);
        }
    }

    // Render email list
    function renderEmailList(emails) {
        const container = document.getElementById('mailList');

        if (emails.length === 0) {
            container.innerHTML = `
                <div class="mail-empty">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <p>暂无邮件</p>
                </div>
            `;
            return;
        }

        container.innerHTML = emails.map(email => `
            <div class="mail-item" onclick="openEmail(${email.id})">
                <div class="mail-sender">${escapeHtml(email.from_addr)}</div>
                <div>
                    <div class="mail-subject">${escapeHtml(email.subject || '(无主题)')}</div>
                    <div class="mail-preview">${escapeHtml(email.content_preview || '')}</div>
                </div>
                <div class="mail-date">${formatDate(email.created_at)}</div>
            </div>
        `).join('');
    }

    // Render pagination
    function renderPagination(data) {
        const container = document.getElementById('pagination');

        if (data.total_pages <= 1) {
            container.innerHTML = '';
            return;
        }

        container.innerHTML = `
            <button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>
            <span>第 ${currentPage} / ${data.total_pages} 页</span>
            <button onclick="goToPage(${currentPage + 1})" ${currentPage >= data.total_pages ? 'disabled' : ''}>下一页</button>
        `;
    }

    // Update badge - always show inbox count
    function updateBadge(count) {
        // Only update if we're viewing inbox
        if (currentFolder === 'inbox') {
            const badge = document.getElementById('inboxBadge');
            badge.textContent = count > 99 ? '99+' : count;
        }
    }

    // Load inbox count separately for badge
    async function loadInboxCount() {
        try {
            const response = await fetch(`/api/mail/list?folder=inbox&page=1&page_size=1`);
            const data = await response.json();
            const badge = document.getElementById('inboxBadge');
            badge.textContent = data.total_count > 99 ? '99+' : data.total_count;
        } catch (error) {
            console.error('Load inbox count error:', error);
        }
    }

    // Switch folder
    function switchFolder(folder) {
        currentFolder = folder;
        currentPage = 1;

        // Update UI
        document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-folder="${folder}"]`).classList.add('active');

        loadEmails();
    }

    // Go to page
    function goToPage(page) {
        currentPage = page;
        loadEmails();
    }

    // Search emails
    function searchEmails(event) {
        if (event.key === 'Enter') {
            currentPage = 1;
            loadEmails();
        }
    }

    // Sync emails
    async function syncEmails() {
        const statusEl = document.getElementById('syncStatus');
        const textEl = document.getElementById('syncText');
        const progressBar = document.getElementById('syncProgressBar');
        const progressFill = document.getElementById('syncProgressFill');
        const progressText = document.getElementById('syncProgressText');

        statusEl.classList.add('syncing');
        textEl.textContent = '同步中...';

        // Show and animate progress bar
        progressBar.classList.add('active');
        progressFill.style.width = '0%';
        progressText.textContent = '连接中...';

        // Simulate progress stages
        let progress = 0;
        const progressInterval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }
        }, 300);

        try {
            progressText.textContent = '获取邮件...';
            const response = await fetch('/api/mail/sync', { method: 'POST' });
            const data = await response.json();

            clearInterval(progressInterval);
            progressFill.style.width = '100%';
            progressText.textContent = '完成';

            if (data.status === 'started' || data.status === 'completed') {
                textEl.textContent = data.message || '同步完成';
                setTimeout(() => {
                    statusEl.classList.remove('syncing');
                    progressBar.classList.remove('active');
                    textEl.textContent = '就绪';
                    progressText.textContent = '';
                    loadEmails();
                }, 2000);
            } else if (data.status === 'already_running') {
                progressText.textContent = '进行中';
                textEl.textContent = '同步进行中...';
            } else {
                statusEl.classList.remove('syncing');
                statusEl.classList.add('error');
                progressBar.classList.remove('active');
                progressText.textContent = '';
                textEl.textContent = data.message || '同步失败';
            }
        } catch (error) {
            clearInterval(progressInterval);
            statusEl.classList.remove('syncing');
            statusEl.classList.add('error');
            progressBar.classList.remove('active');
            progressText.textContent = '';
            textEl.textContent = '同步失败';
        }
    }

    // Open email detail
    async function openEmail(id) {
        currentMailId = id;

        try {
            const response = await fetch(`/api/mail/${id}`);
            const result = await response.json();
            const email = result.email || result;

            // 填充邮件详情
            document.getElementById('detailSubject').textContent = email.subject || '(无主题)';
            document.getElementById('detailFrom').textContent = email.from_addr || '';
            document.getElementById('detailTo').textContent = email.to_addr || '';
            document.getElementById('detailDate').textContent = formatDate(email.received_at || email.created_at);

            // 抄送显示
            const ccRow = document.getElementById('detailCcRow');
            if (email.cc_addr && email.cc_addr.trim()) {
                document.getElementById('detailCc').textContent = email.cc_addr;
                ccRow.style.display = 'block';
            } else {
                ccRow.style.display = 'none';
            }

            // 邮件内容（优先HTML，其次纯文本）
            const bodyEl = document.getElementById('detailBody');
            if (email.html_content && email.html_content.trim()) {
                bodyEl.innerHTML = email.html_content;
            } else {
                bodyEl.textContent = email.content || '(无内容)';
            }

            // Load relations
            loadRelations(id);

            // Show detail panel (Gmail style)
            document.querySelector('.mail-container').classList.remove('detail-closed');
        } catch (error) {
            console.error('Load email error:', error);
        }
    }

    // Close detail panel
    function closeDetailPanel() {
        document.querySelector('.mail-container').classList.add('detail-closed');
        currentMailId = null;
    }

    // Load relations
    async function loadRelations(mailId) {
        try {
            const response = await fetch(`/api/mail/${mailId}/relations`);
            const relations = await response.json();

            const container = document.getElementById('relationTags');
            container.innerHTML = relations.map(rel => `

    // ============ Panel Drag & Position Memory ============
    let isDragging = false;
    let dragOffset = { x: 0, y: 0 };

    // Initialize drag on panel header
    function initComposePanelDrag() {
        const header = document.querySelector('.compose-panel-header');
        const panel = document.getElementById('composePanel');

        header.addEventListener('mousedown', (e) => {
            if (e.target.closest('button')) return; // Don't drag when clicking buttons
            isDragging = true;
            const rect = panel.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            panel.style.transition = 'none'; // Disable transition during drag
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const panel = document.getElementById('composePanel');

            // Calculate new position
            let newX = e.clientX - dragOffset.x;
            let newY = e.clientY - dragOffset.y;

            // Keep panel within viewport
            const maxX = window.innerWidth - 50;
            const maxY = window.innerHeight - 50;
            newX = Math.max(0, Math.min(newX, maxX));
            newY = Math.max(0, Math.min(newY, maxY));

            panel.style.left = newX + 'px';
            panel.style.top = newY + 'px';
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                const panel = document.getElementById('composePanel');
                panel.style.transition = '';
                // Save position to localStorage
                saveComposePanelPosition();
            }
        });
    }

    // Save panel position to localStorage
    function saveComposePanelPosition() {
        const panel = document.getElementById('composePanel');
        const position = {
            left: panel.style.left,
            top: panel.style.top
        };
        localStorage.setItem('composePanelPosition', JSON.stringify(position));
    }

    // Load panel position from localStorage
    function loadComposePanelPosition() {
        const panel = document.getElementById('composePanel');
        const saved = localStorage.getItem('composePanelPosition');
        if (saved) {
            try {
                const position = JSON.parse(saved);
                if (position.left && position.top) {
                    panel.style.left = position.left;
                    panel.style.top = position.top;
                    panel.style.right = 'auto';
                    panel.style.bottom = 'auto';
                }
            } catch (e) {}
        }
    }

    // ============ Panel Size Memory ============
    function initComposePanelResize() {
        const panel = document.getElementById('composePanel');

        // Create ResizeObserver to detect size changes
        const resizeObserver = new ResizeObserver((entries) => {
            for (let entry of entries) {
                const { width, height } = entry.contentRect;
                // Only save if panel is active (visible)
                if (panel.classList.contains('active') && width > 0 && height > 0) {
                    saveComposePanelSize(width, height);
                }
            }
        });
        resizeObserver.observe(panel);

        // Load saved size on init
        loadComposePanelSize();
    }

    // Save panel size to localStorage
    function saveComposePanelSize(width, height) {
        localStorage.setItem('composePanelSize', JSON.stringify({ width, height }));
    }

    // Load panel size from localStorage
    function loadComposePanelSize() {
        const panel = document.getElementById('composePanel');
        const saved = localStorage.getItem('composePanelSize');
        if (saved) {
            try {
                const size = JSON.parse(saved);
                if (size.width && size.height) {
                    panel.style.width = size.width + 'px';
                    panel.style.height = size.height + 'px';
                }
            } catch (e) {}
        }
    }

    // ============ Detail Panel Resizer ============
    function initDetailPanelResizer() {
        const resizer = document.getElementById('mailResizer');
        const detailPanel = document.getElementById('mailDetailPanel');
        const mailMain = document.querySelector('.mail-main');

        if (!resizer || !detailPanel) return;

        // Load saved width
        const savedWidth = localStorage.getItem('mailDetailPanelWidth');
        if (savedWidth) {
            detailPanel.style.width = savedWidth + 'px';
        }

        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            startX = e.clientX;
            startWidth = detailPanel.offsetWidth;
            resizer.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const diff = startX - e.clientX;
            let newWidth = startWidth + diff;

            // Clamp width
            newWidth = Math.max(300, Math.min(800, newWidth));

            detailPanel.style.width = newWidth + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';

                // Save width
                localStorage.setItem('mailDetailPanelWidth', detailPanel.offsetWidth);
            }
        });
    }

    // ============ Drag & Drop Attachments ============
    function initDragDropAttachments() {
        const dropZone = document.getElementById('dropZone');
        const panelBody = document.getElementById('composePanelBody');

        if (!dropZone || !panelBody) return;

        // Prevent default drag behaviors on document
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            panelBody.addEventListener(eventName, preventDefaults, false);
        });

        // Highlight drop zone when dragging over
        ['dragenter', 'dragover'].forEach(eventName => {
            panelBody.addEventListener(eventName, () => {
                dropZone.classList.add('active');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            panelBody.addEventListener(eventName, () => {
                dropZone.classList.remove('active');
            }, false);
        });

        // Handle dropped files
        panelBody.addEventListener('drop', handleDrop, false);
    }

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files.length > 0) {
            const newFiles = Array.from(files);
            selectedFiles = selectedFiles.concat(newFiles);
            updateAttachmentList();
        }
    }

    // ============ Paste Attachments ============
    function initPasteAttachments() {
        const composeBody = document.getElementById('composePanelBody');

        if (!composeBody) return;

        composeBody.addEventListener('paste', handlePaste, false);
    }

    function handlePaste(e) {
        const items = e.clipboardData?.items;
        if (!items) return;

        const files = [];
        for (let i = 0; i < items.length; i++) {
            const item = items[i];

            // Handle file types (images, documents, etc.)
            if (item.kind === 'file') {
                const file = item.getAsFile();
                if (file) {
                    // Generate filename if it's a pasted image without name
                    if (file.type.startsWith('image/') && (!file.name || file.name === 'image.png')) {
                        const ext = file.type.split('/')[1] || 'png';
                        const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                        const renamedFile = new File([file], `pasted-image-${timestamp}.${ext}`, { type: file.type });
                        files.push(renamedFile);
                    } else {
                        files.push(file);
                    }
                }
            }
        }

        if (files.length > 0) {
            selectedFiles = selectedFiles.concat(files);
            updateAttachmentList();

            // Show brief notification
            const dropZone = document.getElementById('dropZone');
            dropZone.classList.add('active');
            setTimeout(() => dropZone.classList.remove('active'), 500);
        }
    }
</script>
