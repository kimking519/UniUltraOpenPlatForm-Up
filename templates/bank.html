{% extends "layout.html" %}

{% block title %}银行流水管理 - UniUltra 开放平台{% endblock %}

{% block content %}
<style>
    .page-header {
        display: flex;
        align-items: center;
        margin-bottom: 1rem;
        gap: 1rem;
        flex-wrap: wrap;
    }
    .page-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .page-header h1 svg {
        width: 28px;
        height: 28px;
        color: var(--primary);
    }
    .header-filters {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
    }
    .header-filters input,
    .header-filters select {
        padding: 0.4rem 0.6rem;
        font-size: 0.8rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--card-bg);
        color: var(--text-main);
    }
    .header-filters input[type="text"] { width: 140px; }
    .header-filters input[type="date"] { width: 130px; }
    .header-filters select { min-width: 100px; }
    .filter-matched { width: 100px; }
    .header-actions {
        margin-left: auto;
        display: flex;
        gap: 0.5rem;
    }
    .btn-import {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.5rem 1rem;
        background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
    }
    .btn-import:hover { transform: scale(1.02); }
    .btn-import svg { width: 18px; height: 18px; }
    .btn-batch-delete {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.5rem 1rem;
        background: #EF4444;
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        display: none;
    }
    .btn-batch-delete.show { display: flex; }
    .btn-batch-delete:hover { opacity: 0.9; }
    .btn-batch-delete svg { width: 18px; height: 18px; }

    /* 流水列表表格 */
    .bank-table-wrapper {
        width: 100%;
        overflow-x: auto;
        border-radius: var(--radius-lg);
        background: var(--card-bg);
        border: var(--glass-border);
    }
    .bank-table {
        width: 100%;
        min-width: 1800px;
        border-collapse: collapse;
        font-size: 0.8rem;
    }
    .bank-table th {
        background: var(--bg-glass);
        color: var(--text-muted);
        padding: 0.5rem 0.6rem;
        text-align: left;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        position: sticky;
        top: 0;
    }
    .bank-table td {
        padding: 0.5rem 0.6rem;
        border-bottom: 1px solid var(--border);
        color: var(--text-main);
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .bank-table tr:hover td {
        background: rgba(99, 102, 241, 0.05);
    }
    .bank-table .checkbox-col {
        width: 40px;
        text-align: center;
    }
    .bank-table .checkbox-col input {
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    .bank-table .amount {
        font-weight: 600;
        color: #10B981;
        font-family: 'Inter', monospace;
    }
    .bank-table .amount.negative { color: #EF4444; }
    .bank-table .matched-status {
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
        padding: 0.2rem 0.4rem;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 500;
    }
    .matched-status.unmatched {
        background: rgba(239, 68, 68, 0.1);
        color: #EF4444;
    }
    .matched-status.partial {
        background: rgba(245, 158, 11, 0.1);
        color: #F59E0B;
    }
    .matched-status.full {
        background: rgba(16, 185, 129, 0.1);
        color: #10B981;
    }
    .bank-table .actions {
        display: flex;
        gap: 0.3rem;
        white-space: nowrap;
    }
    .btn-action {
        padding: 0.25rem 0.4rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-glass);
        color: var(--text-main);
        cursor: pointer;
        font-size: 0.7rem;
    }
    .btn-action:hover { background: rgba(99, 102, 241, 0.1); }
    .btn-action.primary { border-color: var(--primary); color: var(--primary); }
    .btn-action.danger { border-color: #EF4444; color: #EF4444; }

    /* 分页 */
    .pagination {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: center;
        margin-top: 1rem;
    }
    .pagination button {
        padding: 0.4rem 0.8rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--card-bg);
        color: var(--text-main);
        cursor: pointer;
    }
    .pagination button.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
    .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* 关联订单模态框 */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
    }
    .modal-overlay.show { display: flex; align-items: center; justify-content: center; }
    .modal-content {
        background: var(--card-bg);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        width: 90%;
        max-width: 600px;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
    }
    .modal-header h3 {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-main);
    }
    .modal-close {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.5rem;
    }
    .modal-body .tx-info {
        background: var(--bg-glass);
        padding: 0.8rem;
        border-radius: var(--radius);
        margin-bottom: 1rem;
    }
    .tx-info-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 0.5rem;
    }
    .tx-info-row:last-child { margin-bottom: 0; }
    .tx-info-label { color: var(--text-muted); min-width: 80px; }
    .tx-info-value { color: var(--text-main); font-weight: 500; }
    .order-search {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
    }
    .order-search input {
        flex: 1;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-glass);
        color: var(--text-main);
    }
    .order-list {
        max-height: 300px;
        overflow-y: auto;
    }
    .order-item {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.6rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 0.5rem;
        cursor: pointer;
    }
    .order-item:hover { background: rgba(99, 102, 241, 0.1); }
    .order-item.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.15); }
    .order-item input[type="checkbox"] { width: 18px; height: 18px; }
    .order-item-info { flex: 1; }
    .order-item-no { font-weight: 500; color: var(--text-main); }
    .order-item-cli { color: var(--text-muted); font-size: 0.8rem; }
    .allocation-input {
        width: 100px;
        padding: 0.3rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        text-align: right;
    }
    .modal-footer {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 1rem;
    }
    .btn-cancel {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-glass);
        color: var(--text-main);
        cursor: pointer;
    }
    .btn-confirm {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: var(--radius);
        background: var(--primary);
        color: white;
        cursor: pointer;
    }

    /* 统计卡片 */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1rem;
    }
    .stat-card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 1rem;
        border: var(--glass-border);
    }
    .stat-label { color: var(--text-muted); font-size: 0.8rem; }
    .stat-value { font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin-top: 0.3rem; }
    .stat-value.green { color: #10B981; }
    .stat-value.red { color: #EF4444; }
    .stat-value.orange { color: #F59E0B; }

    /* 选中计数 */
    .selection-info {
        color: var(--primary);
        font-size: 0.85rem;
        margin-left: 0.5rem;
    }
</style>

<div class="page-header">
    <h1>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4a2 2 0 012-2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 0v16h12V4H6zm2 2h8v2H8V6zm8 4H8v2h8v-2zm-8 4h4v2H8v-2z"/></svg>
        银行流水管理
    </h1>
    <div class="header-filters">
        <input type="date" id="filterStartDate" placeholder="开始日期">
        <input type="date" id="filterEndDate" placeholder="结束日期">
        <select id="filterMatched" class="filter-matched">
            <option value="">匹配状态</option>
            <option value="0">未匹配</option>
            <option value="2">部分匹配</option>
            <option value="1">完全匹配</option>
        </select>
        <input type="text" id="filterPayer" placeholder="付款方搜索">
        <input type="number" id="filterMinAmount" placeholder="最小金额" style="width: 80px;">
        <input type="number" id="filterMaxAmount" placeholder="最大金额" style="width: 80px;">
        <button onclick="loadTransactions()" class="btn-action primary">筛选</button>
    </div>
    <div class="header-actions">
        <span class="selection-info" id="selectionInfo"></span>
        <button class="btn-batch-delete" id="batchDeleteBtn" onclick="batchDelete()">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            删除勾选
        </button>
        <a href="/bank/import" class="btn-import">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
            导入流水
        </a>
    </div>
</div>

<!-- 统计卡片 -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">总流入金额</div>
        <div class="stat-value green" id="statIncome">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">总流出金额</div>
        <div class="stat-value red" id="statExpense">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">未匹配金额</div>
        <div class="stat-value orange" id="statUnmatched">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">流水总数</div>
        <div class="stat-value" id="statTotal">--</div>
    </div>
</div>

<!-- 流水列表 -->
<div class="bank-table-wrapper" style="padding: 1rem;">
    <table class="bank-table">
        <thead>
            <tr>
                <th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                <th>交易时间</th>
                <th>交易编号</th>
                <th>记账流水号</th>
                <th>交易类型</th>
                <th>交易详情</th>
                <th>币种</th>
                <th>交易金额</th>
                <th>总余额</th>
                <th>付款人名称</th>
                <th>付款银行</th>
                <th>付款账号</th>
                <th>收款人名称</th>
                <th>收款银行</th>
                <th>收款账号</th>
                <th>收款人备注名</th>
                <th>附言</th>
                <th>匹配状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="transactionList">
            <tr><td colspan="19" style="text-align: center; color: var(--text-muted);">加载中...</td></tr>
        </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
</div>

<!-- 关联订单模态框 -->
<div class="modal-overlay" id="linkModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>关联订单</h3>
            <button class="modal-close" onclick="closeLinkModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="tx-info">
                <div class="tx-info-row">
                    <span class="tx-info-label">交易时间：</span>
                    <span class="tx-info-value" id="modalTxTime"></span>
                </div>
                <div class="tx-info-row">
                    <span class="tx-info-label">交易金额：</span>
                    <span class="tx-info-value" id="modalTxAmount"></span>
                    <span class="tx-info-label" style="margin-left: 1rem;">剩余可分配：</span>
                    <span class="tx-info-value" id="modalRemaining"></span>
                </div>
                <div class="tx-info-row">
                    <span class="tx-info-label">付款方：</span>
                    <span class="tx-info-value" id="modalPayer"></span>
                </div>
            </div>

            <div class="order-search">
                <input type="text" id="orderSearch" placeholder="搜索订单号或客户名..." onkeyup="searchOrders()">
                <button class="btn-action" onclick="searchOrders()">搜索</button>
            </div>

            <div class="order-list" id="orderList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeLinkModal()">取消</button>
            <button class="btn-confirm" onclick="confirmLink()">确认关联</button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let pageSize = 20;
let currentTxId = null;
let selectedOrders = [];
let selectedTxIds = [];  // 勾选的流水ID列表
let allTransactions = []; // 当前页所有流水数据

function loadTransactions() {
    const params = new URLSearchParams({
        page: currentPage,
        page_size: pageSize,
        start_date: document.getElementById('filterStartDate').value,
        end_date: document.getElementById('filterEndDate').value,
        is_matched: document.getElementById('filterMatched').value,
        payer_name: document.getElementById('filterPayer').value,
        min_amount: document.getElementById('filterMinAmount').value,
        max_amount: document.getElementById('filterMaxAmount').value
    });

    fetch('/api/bank/list?' + params)
        .then(r => r.json())
        .then(data => {
            allTransactions = data.items;
            selectedTxIds = [];
            updateSelectionUI();
            renderTransactions(data.items);
            renderPagination(data.total, data.total_pages);
            updateStats(data.items);
        })
        .catch(err => {
            document.getElementById('transactionList').innerHTML = '<tr><td colspan="19" style="text-align: center; color: #EF4444;">加载失败</td></tr>';
        });
}

function renderTransactions(items) {
    if (!items.length) {
        document.getElementById('transactionList').innerHTML = '<tr><td colspan="19" style="text-align: center; color: var(--text-muted);">暂无数据</td></tr>';
        return;
    }

    let html = '';
    items.forEach(tx => {
        const statusClass = tx.is_matched === 0 ? 'unmatched' : (tx.is_matched === 2 ? 'partial' : 'full');
        const statusText = tx.is_matched === 0 ? '未匹配' : (tx.is_matched === 2 ? '部分匹配' : '完全匹配');
        const isSelected = selectedTxIds.includes(tx.transaction_id);

        html += `<tr>
            <td class="checkbox-col"><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${tx.transaction_id}', ${tx.is_matched})"></td>
            <td>${tx.transaction_time ? tx.transaction_time.substring(0, 16) : '--'}</td>
            <td title="${tx.transaction_no || ''}">${tx.transaction_no ? (tx.transaction_no.length > 20 ? tx.transaction_no.substring(0, 20) + '...' : tx.transaction_no) : '--'}</td>
            <td title="${tx.ledger_no || ''}">${tx.ledger_no ? (tx.ledger_no.length > 20 ? tx.ledger_no.substring(0, 20) + '...' : tx.ledger_no) : '--'}</td>
            <td>${tx.transaction_type || '--'}</td>
            <td title="${tx.transaction_detail || ''}">${tx.transaction_detail ? (tx.transaction_detail.length > 30 ? tx.transaction_detail.substring(0, 30) + '...' : tx.transaction_detail) : '--'}</td>
            <td>${tx.currency || 'CNY'}</td>
            <td class="amount">${tx.transaction_amount.toFixed(2)}</td>
            <td>${tx.balance ? tx.balance.toFixed(2) : '--'}</td>
            <td title="${tx.payer_name || ''}">${tx.payer_name ? (tx.payer_name.length > 20 ? tx.payer_name.substring(0, 20) + '...' : tx.payer_name) : '--'}</td>
            <td title="${tx.payer_bank || ''}">${tx.payer_bank ? (tx.payer_bank.length > 15 ? tx.payer_bank.substring(0, 15) + '...' : tx.payer_bank) : '--'}</td>
            <td title="${tx.payer_account || ''}">${tx.payer_account ? (tx.payer_account.length > 15 ? tx.payer_account.substring(0, 15) + '...' : tx.payer_account) : '--'}</td>
            <td title="${tx.payee_name || ''}">${tx.payee_name ? (tx.payee_name.length > 20 ? tx.payee_name.substring(0, 20) + '...' : tx.payee_name) : '--'}</td>
            <td title="${tx.payee_bank || ''}">${tx.payee_bank ? (tx.payee_bank.length > 15 ? tx.payee_bank.substring(0, 15) + '...' : tx.payee_bank) : '--'}</td>
            <td title="${tx.payee_account || ''}">${tx.payee_account ? (tx.payee_account.length > 15 ? tx.payee_account.substring(0, 15) + '...' : tx.payee_account) : '--'}</td>
            <td title="${tx.payee_remark_name || ''}">${tx.payee_remark_name ? (tx.payee_remark_name.length > 15 ? tx.payee_remark_name.substring(0, 15) + '...' : tx.payee_remark_name) : '--'}</td>
            <td title="${tx.remark_text || ''}">${tx.remark_text ? (tx.remark_text.length > 20 ? tx.remark_text.substring(0, 20) + '...' : tx.remark_text) : '--'}</td>
            <td><span class="matched-status ${statusClass}">${statusText}</span></td>
            <td class="actions">
                ${tx.is_matched !== 1 ? `<button class="btn-action primary" onclick="openLinkModal('${tx.transaction_id}', ${tx.transaction_amount}, '${tx.payer_name || ''}', '${tx.transaction_time || ''}')">关联</button>` : ''}
                <button class="btn-action" onclick="viewDetail('${tx.transaction_id}')">详情</button>
                ${tx.is_matched === 0 ? `<button class="btn-action danger" onclick="deleteTx('${tx.transaction_id}')">删除</button>` : ''}
            </td>
        </tr>`;
    });
    document.getElementById('transactionList').innerHTML = html;
}

function toggleSelect(txId, isMatched) {
    if (isMatched !== 0) {
        alert('已关联的流水无法删除，请先解除关联');
        // 取消勾选
        return;
    }

    const idx = selectedTxIds.indexOf(txId);
    if (idx >= 0) {
        selectedTxIds.splice(idx, 1);
    } else {
        selectedTxIds.push(txId);
    }
    updateSelectionUI();
}

function toggleSelectAll() {
    const selectAllCheckbox = document.getElementById('selectAll');

    if (selectAllCheckbox.checked) {
        // 勾选所有未匹配的流水
        selectedTxIds = allTransactions.filter(tx => tx.is_matched === 0).map(tx => tx.transaction_id);
    } else {
        selectedTxIds = [];
    }

    // 重新渲染以更新checkbox状态
    renderTransactions(allTransactions);
    updateSelectionUI();
}

function updateSelectionUI() {
    const btn = document.getElementById('batchDeleteBtn');
    const info = document.getElementById('selectionInfo');

    if (selectedTxIds.length > 0) {
        btn.classList.add('show');
        info.textContent = `已勾选 ${selectedTxIds.length} 条`;
    } else {
        btn.classList.remove('show');
        info.textContent = '';
    }

    // 更新全选checkbox状态
    const unmatchedCount = allTransactions.filter(tx => tx.is_matched === 0).length;
    document.getElementById('selectAll').checked = selectedTxIds.length === unmatchedCount && unmatchedCount > 0;
}

function batchDelete() {
    if (selectedTxIds.length === 0) {
        alert('请先勾选要删除的流水');
        return;
    }

    if (!confirm(`确定删除勾选的 ${selectedTxIds.length} 条流水？\n注意：只有未匹配的流水可以删除。`)) return;

    fetch('/api/bank/batch_delete_selected', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_ids: selectedTxIds })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert(data.message);
            selectedTxIds = [];
            loadTransactions();
        } else {
            alert(data.message);
        }
    });
}

function renderPagination(total, totalPages) {
    if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = `<span style="color: var(--text-muted);">共 ${total} 条</span>`;
        return;
    }

    let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(1)">首页</button>`;
    html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;

    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }

    html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
    html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${totalPages})">末页</button>`;
    html += `<span style="color: var(--text-muted); margin-left: 0.5rem;">共 ${total} 条</span>`;

    document.getElementById('pagination').innerHTML = html;
}

function goPage(page) {
    currentPage = page;
    loadTransactions();
}

function updateStats(items) {
    let income = 0, expense = 0, unmatched = 0, total = items.length;
    items.forEach(tx => {
        // 根据交易类型判断收入/支出
        const type = tx.transaction_type || '';
        if (type.includes('收入') || type.includes('收款') || type.includes('进账')) {
            income += tx.transaction_amount;
        } else if (type.includes('支出') || type.includes('付款') || type.includes('转账') || type.includes('手续费')) {
            expense += tx.transaction_amount;
        }
        if (tx.is_matched === 0) unmatched += tx.transaction_amount;
    });
    document.getElementById('statIncome').textContent = income.toFixed(2);
    document.getElementById('statExpense').textContent = expense.toFixed(2);
    document.getElementById('statUnmatched').textContent = unmatched.toFixed(2);
    document.getElementById('statTotal').textContent = total;
}

function openLinkModal(txId, amount, payer, time) {
    currentTxId = txId;
    selectedOrders = [];

    document.getElementById('modalTxTime').textContent = time ? time.substring(0, 16) : '--';
    document.getElementById('modalTxAmount').textContent = amount.toFixed(2);
    document.getElementById('modalPayer').textContent = payer || '--';

    // 计算剩余可分配金额
    fetch(`/api/ledger/by_transaction/${txId}`)
        .then(r => r.json())
        .then(data => {
            const allocated = data.items.reduce((sum, l) => sum + l.allocation_amount, 0);
            const remaining = amount - allocated;
            document.getElementById('modalRemaining').textContent = remaining.toFixed(2);
        });

    // 加载可关联的订单
    searchOrders();

    document.getElementById('linkModal').classList.add('show');
}

function closeLinkModal() {
    document.getElementById('linkModal').classList.remove('show');
    currentTxId = null;
    selectedOrders = [];
}

function searchOrders() {
    const keyword = document.getElementById('orderSearch').value;

    fetch(`/api/order_manager/list?page=1&page_size=50&search_kw=${encodeURIComponent(keyword)}`)
        .then(r => r.json())
        .then(data => {
            renderOrderList(data.items);
        });
}

function renderOrderList(orders) {
    if (!orders.length) {
        document.getElementById('orderList').innerHTML = '<p style="color: var(--text-muted); text-align: center;">未找到订单</p>';
        return;
    }

    let html = '';
    orders.forEach(o => {
        const isSelected = selectedOrders.some(s => s.manager_id === o.manager_id);
        html += `<div class="order-item ${isSelected ? 'selected' : ''}" onclick="toggleOrder('${o.manager_id}', '${o.customer_order_no}', '${o.cli_name}')">
            <input type="checkbox" ${isSelected ? 'checked' : ''}>
            <div class="order-item-info">
                <div class="order-item-no">${o.customer_order_no}</div>
                <div class="order-item-cli">${o.cli_name}</div>
            </div>
            ${isSelected ? `<input type="number" class="allocation-input" id="alloc_${o.manager_id}" value="${selectedOrders.find(s => s.manager_id === o.manager_id)?.amount || 0}" placeholder="分配金额">` : ''}
        </div>`;
    });
    document.getElementById('orderList').innerHTML = html;
}

function toggleOrder(managerId, orderNo, cliName) {
    const existing = selectedOrders.findIndex(s => s.manager_id === managerId);
    if (existing >= 0) {
        selectedOrders.splice(existing, 1);
    } else {
        selectedOrders.push({ manager_id: managerId, order_no: orderNo, cli_name: cliName, amount: 0 });
    }
    renderOrderListFromSelected();
}

function renderOrderListFromSelected() {
    const keyword = document.getElementById('orderSearch').value;
    fetch(`/api/order_manager/list?page=1&page_size=50&search_kw=${encodeURIComponent(keyword)}`)
        .then(r => r.json())
        .then(data => {
            renderOrderList(data.items);
        });
}

function confirmLink() {
    if (!currentTxId || selectedOrders.length === 0) {
        alert('请选择至少一个订单');
        return;
    }

    let promises = [];
    selectedOrders.forEach(o => {
        const amountInput = document.getElementById(`alloc_${o.manager_id}`);
        const allocationAmount = amountInput ? parseFloat(amountInput.value) : 0;

        if (allocationAmount <= 0) {
            alert(`${o.order_no} 的分配金额必须大于0`);
            return;
        }

        promises.push(
            fetch('/api/ledger/link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    transaction_id: currentTxId,
                    manager_id: o.manager_id,
                    allocation_amount: allocationAmount
                })
            }).then(r => r.json())
        );
    });

    Promise.all(promises)
        .then(results => {
            const failed = results.filter(r => !r.success);
            if (failed.length > 0) {
                alert(`部分关联失败: ${failed.map(f => f.message).join(', ')}`);
            } else {
                closeLinkModal();
                loadTransactions();
                alert('关联成功');
            }
        });
}

function viewDetail(txId) {
    fetch(`/api/bank/${txId}`)
        .then(r => r.json())
        .then(tx => {
            // 构建详细信息
            let detail = `交易时间: ${tx.transaction_time || '--'}\n`;
            detail += `交易编号: ${tx.transaction_no || '--'}\n`;
            detail += `记账流水号: ${tx.ledger_no || '--'}\n`;
            detail += `交易类型: ${tx.transaction_type || '--'}\n`;
            detail += `交易详情: ${tx.transaction_detail || '--'}\n`;
            detail += `币种: ${tx.currency || 'CNY'}\n`;
            detail += `交易金额: ${tx.transaction_amount}\n`;
            detail += `总余额: ${tx.balance || '--'}\n`;
            detail += `付款人: ${tx.payer_name || '--'}\n`;
            detail += `付款银行: ${tx.payer_bank || '--'}\n`;
            detail += `付款账号: ${tx.payer_account || '--'}\n`;
            detail += `收款人: ${tx.payee_name || '--'}\n`;
            detail += `收款银行: ${tx.payee_bank || '--'}\n`;
            detail += `收款账号: ${tx.payee_account || '--'}\n`;
            detail += `收款人备注名: ${tx.payee_remark_name || '--'}\n`;
            detail += `附言: ${tx.remark_text || '--'}\n`;
            alert(detail);
        });
}

function deleteTx(txId) {
    if (!confirm('确定删除该流水？')) return;

    fetch('/api/bank/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_id: txId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            loadTransactions();
        } else {
            alert(data.message);
        }
    });
}

// 页面加载
loadTransactions();
</script>
{% endblock %}
