<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniUltra 开放平台</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}?v=2.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* Sidebar Enhancements */
        .sidebar {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(30, 41, 59, 0.98) 100%);
            position: relative;
            min-width: 60px !important;
            max-width: 400px !important;
            flex: 0 0 auto !important;
            width: 260px;
        }

        /* 侧边栏拖动条 */
        .sidebar-resizer {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 10;
            transition: background 0.2s;
        }

        .sidebar-resizer:hover,
        .sidebar-resizer.dragging {
            background: var(--primary, #6366F1);
        }

        .sidebar-resizer::after {
            content: '';
            position: absolute;
            right: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sidebar-resizer:hover::after {
            opacity: 1;
        }

        /* 侧边栏收缩模式 - 只显示图标 */
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .menu-item span,
        .sidebar.collapsed .menu-section,
        .sidebar.collapsed .submenu {
            display: none;
        }

        .sidebar.collapsed .menu-item {
            justify-content: center;
            padding: 0.75rem;
        }

        .sidebar.collapsed .menu-item .menu-icon {
            opacity: 1;
        }

        .sidebar.collapsed .sidebar-logo {
            justify-content: center;
            padding: 1.5rem 0.5rem;
        }

        .sidebar.collapsed .menu-group .group-title {
            justify-content: center;
        }

        .sidebar.collapsed .chevron-icon {
            display: none;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366F1 0%, #10B981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: rgba(241, 245, 249, 0.7);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 1.15rem;
            position: relative;
            margin: 0.125rem 0.75rem;
            border-radius: 8px;
        }

        .menu-item .menu-icon {
            width: 26px;
            height: 26px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .menu-item:hover {
            color: #F1F5F9;
            background: rgba(99, 102, 241, 0.1);
        }

        .menu-item:hover .menu-icon {
            opacity: 1;
        }

        .menu-item.active {
            color: #F1F5F9;
            background: rgba(99, 102, 241, 0.15);
        }

        .menu-item.active .menu-icon {
            opacity: 1;
            color: var(--primary-light);
        }

        /* Active indicator */
        .menu-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: linear-gradient(180deg, #6366F1 0%, #8B5CF6 100%);
            border-radius: 0 2px 2px 0;
        }

        .menu-section {
            padding: 1rem 1.5rem 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(241, 245, 249, 0.4);
        }

        /* Navbar Enhancements */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }

        [data-theme="dark"] .navbar {
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(71, 85, 105, 0.2);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Breadcrumbs */
        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .breadcrumbs a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumbs a:hover {
            color: var(--primary);
        }

        .breadcrumbs .current {
            color: var(--text-main);
            font-weight: 500;
        }

        .breadcrumbs .separator {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* Search Box */
        .search-box {
            position: relative;
            width: 280px;
        }

        .search-box input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 0.875rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--card-bg);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Navbar Actions */
        .navbar-action {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .navbar-action:hover {
            background: var(--bg-glass-hover);
            color: var(--primary);
            border-color: var(--primary);
        }

        .navbar-action svg {
            width: 18px;
            height: 18px;
        }

        .navbar-action .badge-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background: #EF4444;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
        }

        /* User Profile */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.375rem 0.75rem 0.375rem 0.375rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-profile:hover {
            background: var(--bg-glass-hover);
            border-color: var(--primary);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .user-role {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-main);
        }

        .mobile-menu-toggle svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }

            .search-box {
                display: none;
            }

            .breadcrumbs {
                display: none;
            }

            .user-info {
                display: none;
            }
        }

        /* 复制按钮样式 */
        .copyable-cell {
            position: relative;
            cursor: default;
        }
        .copy-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 4px;
            cursor: pointer;
            font-size: 10px;
            line-height: 1;
        }
        .copyable-cell:hover .copy-btn {
            opacity: 1;
        }
        .copy-btn:hover {
            background: #4f46e5;
        }
        .copy-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* 表格列宽调整样式 */
        .data-table th {
            position: relative;
            user-select: none;
        }

        .col-resizer {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 1;
        }

        .col-resizer:hover,
        .col-resizer.dragging {
            background: var(--primary, #6366F1);
        }

        .data-table th.resizing {
            background: rgba(99, 102, 241, 0.1);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <!-- 拖动条 -->
        <div class="sidebar-resizer" id="sidebarResizer"></div>
        <!-- Logo -->
        <a href="/" class="sidebar-logo" style="text-decoration: none; cursor: pointer;">
            <div class="logo-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="logo-text">UniUltra</span>
        </a>

        <nav class="sidebar-menu">
            <div class="menu-section">主菜单</div>

            <a href="/" class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>总控制台</span>
            </a>

            <a href="/quote" class="menu-item {% if active_page == 'quote' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span>需求管理</span>
            </a>

            <a href="/offer" class="menu-item {% if active_page == 'offer' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                </svg>
                <span>报价订单</span>
            </a>

            <a href="/order" class="menu-item {% if active_page == 'order' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                <span>销售订单</span>
            </a>

            <a href="/buy" class="menu-item {% if active_page == 'buy' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span>采购管理</span>
            </a>

            <a href="/daily" class="menu-item {% if active_page == 'daily' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                </svg>
                <span>动态参数</span>
            </a>

            <a href="/emp" class="menu-item {% if active_page == 'emp' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <span>员工管理</span>
            </a>

            <a href="/cli" class="menu-item {% if active_page == 'cli' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span>客户表</span>
            </a>

            <a href="/vendor" class="menu-item {% if active_page == 'vendor' %}active{% endif %}">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
                <span>供应商表</span>
            </a>
        </nav>

        <!-- Sidebar Footer -->
        <div style="padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); margin-top: auto;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: rgba(241,245,249,0.4);">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>v2.0 Glassmorphism</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <header class="navbar">
            <div class="navbar-left">
                <!-- Mobile Menu Toggle -->
                <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>

                <!-- Search Box -->
                <div class="search-box">
                    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" placeholder="搜索..." id="globalSearch">
                </div>
            </div>

            <div class="navbar-right">
                <!-- Theme Toggle -->
                <button class="navbar-action" onclick="toggleTheme()" title="切换深色/浅色模式">
                    <svg class="theme-toggle-icon sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg class="theme-toggle-icon moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>

                <!-- Notifications -->
                <div class="navbar-action" style="font-size: 0.8rem; color: var(--text-muted); padding: 0.5rem 0.75rem; background: var(--bg-glass); border-radius: 6px;">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px; margin-right: 0.3rem;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <span id="system-env">检测中...</span>
                </div>

                <script>
                    // 检测服务器环境（而不是浏览器环境）
                    document.addEventListener('DOMContentLoaded', function() {
                        fetch('/api/server/env')
                            .then(response => response.json())
                            .then(data => {
                                if (data.success) {
                                    document.getElementById('system-env').textContent = data.env;
                                }
                            })
                            .catch(() => {
                                document.getElementById('system-env').textContent = 'Unknown';
                            });
                    });
                </script>

                <!-- User Dropdown -->
                <div class="user-dropdown">
                    <div class="user-profile">
                        <div class="user-avatar">A</div>
                        <div class="user-info">
                            <span class="user-name">管理员</span>
                            <span class="user-role">Admin</span>
                        </div>
                        <svg class="chevron-icon" style="width: 16px; height: 16px;" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="dropdown-menu">
                        <a href="/settings" class="dropdown-item">
                            <svg class="item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span>设置</span>
                        </a>
                        <hr class="dropdown-divider">
                        <a href="/logout" class="dropdown-item logout">
                            <svg class="item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            <span>退出登录</span>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let alertMsg = [];

            if (params.has('import_success')) {
                const count = parseInt(params.get('import_success'), 10);
                if (count > 0) alertMsg.push(`批量导入成功: ${count} 条`);
            }
            if (params.has('errors')) {
                const count = parseInt(params.get('errors'), 10);
                if (count > 0) alertMsg.push(`导入失败: ${count} 条`);
            }
            if (params.has('msg')) {
                const prefix = params.get('success') === '1' ? '操作成功: ' : '操作失败: ';
                alertMsg.push(prefix + params.get('msg'));
            }

            if (alertMsg.length > 0) {
                alert(alertMsg.join('\n'));
                const newUrl = window.location.pathname +
                    window.location.search.replace(/[?&](import_success|errors|msg|success)=[^&]+/g, '')
                        .replace(/^&/, '?').replace(/\?$/, '');
                window.history.replaceState({}, document.title, newUrl || window.location.pathname);
            }
        });
    </script>

    <script>
        function toggleSubmenu(id, event) {

            const submenu = document.getElementById(id);
            const icon = event.currentTarget.querySelector('.chevron-icon');
            if (submenu.classList.contains('open')) {
                submenu.classList.remove('open');
                if (icon) icon.classList.remove('rotated');
            } else {
                submenu.classList.add('open');
                if (icon) icon.classList.add('rotated');
            }
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('open');
        }

        // 侧边栏拖动调整宽度
        (function() {
            const sidebar = document.querySelector('.sidebar');
            const resizer = document.getElementById('sidebarResizer');

            if (!sidebar || !resizer) return;

            // 更新侧边栏状态（图标模式/完整模式）
            function updateSidebarState(width) {
                if (width <= 150) {
                    sidebar.classList.add('collapsed');
                } else {
                    sidebar.classList.remove('collapsed');
                }
            }

            // 从localStorage恢复宽度
            const savedWidth = localStorage.getItem('sidebarWidth');
            if (savedWidth) {
                sidebar.style.width = savedWidth + 'px';
                updateSidebarState(parseInt(savedWidth));
            }

            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                resizer.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                const diff = e.clientX - startX;
                const newWidth = Math.max(60, Math.min(400, startWidth + diff));
                sidebar.style.width = newWidth + 'px';
                updateSidebarState(newWidth);
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';

                    // 保存宽度到localStorage
                    localStorage.setItem('sidebarWidth', sidebar.offsetWidth);
                }
            });
        })();
    </script>

    <!-- Theme Toggle Script -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                updateThemeIcons(true);
            } else {
                document.documentElement.removeAttribute('data-theme');
                updateThemeIcons(false);
            }
        })();

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                updateThemeIcons(false);
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                updateThemeIcons(true);
            }
        }

        function updateThemeIcons(isDark) {
            const sunIcons = document.querySelectorAll('.sun-icon');
            const moonIcons = document.querySelectorAll('.moon-icon');
            sunIcons.forEach(icon => icon.style.display = isDark ? 'block' : 'none');
            moonIcons.forEach(icon => icon.style.display = isDark ? 'none' : 'block');
        }

    <!-- 表格列宽调整功能 -->
    <script>
        (function() {
            // 初始化表格列宽调整功能
            function initColumnResize() {
                const tables = document.querySelectorAll('.data-table');
                if (tables.length === 0) return;

                tables.forEach(table => {
                    const thead = table.querySelector('thead');
                    if (!thead) return;

                    const ths = thead.querySelectorAll('th');
                    const pageKey = window.location.pathname.replace(/\//g, '_') || '_main';

                    // 恢复保存的列宽
                    const savedWidths = JSON.parse(localStorage.getItem('tableColWidth_' + pageKey) || '{}');

                    ths.forEach((th, index) => {
                        // 跳过操作列（最后一列）
                        if (index === ths.length - 1) return;

                        // 恢复保存的宽度
                        if (savedWidths[index]) {
                            th.style.width = savedWidths[index] + 'px';
                            th.style.minWidth = savedWidths[index] + 'px';
                        }

                        // 创建拖动条
                        const resizer = document.createElement('div');
                        resizer.className = 'col-resizer';
                        th.appendChild(resizer);

                        // 拖动事件
                        let startX, startWidth, isResizing = false;

                        resizer.addEventListener('mousedown', (e) => {
                            isResizing = true;
                            startX = e.clientX;
                            startWidth = th.offsetWidth;
                            resizer.classList.add('dragging');
                            th.classList.add('resizing');
                            document.body.style.cursor = 'col-resize';
                            document.body.style.userSelect = 'none';
                            e.preventDefault();
                            e.stopPropagation();
                        });

                        document.addEventListener('mousemove', (e) => {
                            if (!isResizing) return;

                            const diff = e.clientX - startX;
                            const newWidth = Math.max(50, startWidth + diff);
                            th.style.width = newWidth + 'px';
                            th.style.minWidth = newWidth + 'px';
                        });

                        document.addEventListener('mouseup', () => {
                            if (isResizing) {
                                isResizing = false;
                                resizer.classList.remove('dragging');
                                th.classList.remove('resizing');
                                document.body.style.cursor = '';
                                document.body.style.userSelect = '';

                                // 保存列宽
                                const widths = JSON.parse(localStorage.getItem('tableColWidth_' + pageKey) || '{}');
                                widths[index] = th.offsetWidth;
                                localStorage.setItem('tableColWidth_' + pageKey, JSON.stringify(widths));
                            }
                        });
                    });
                });
            }

            // 页面加载后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initColumnResize);
            } else {
                initColumnResize();
            }

            // 暴露全局方法供动态内容使用
            window.initColumnResize = initColumnResize;
        })();
    </script>

    <!-- Global UI Scripts -->
    <script>
        // ============================================
        // Toast Notification System
        // ============================================
        const Toast = {
            container: null,

            init() {
                this.container = document.getElementById('toast-container');
            },

            show(message, type = 'info', duration = 3000) {
                if (!this.container) this.init();

                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${this.getIcon(type)}
                    </svg>
                    <span>${message}</span>
                `;

                this.container.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            },

            getIcon(type) {
                switch(type) {
                    case 'success':
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
                    case 'error':
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
                    case 'warning':
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>';
                    default:
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';
                }
            },

            success(message, duration) { this.show(message, 'success', duration); },
            error(message, duration) { this.show(message, 'error', duration); },
            warning(message, duration) { this.show(message, 'warning', duration); },
            info(message, duration) { this.show(message, 'info', duration); }
        };

        // Add slideOut animation
        const style = document.createElement('style');
        style.textContent = `@keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }`;
        document.head.appendChild(style);

        // ============================================
        // Confirm Dialog System
        // ============================================
        const Confirm = {
            show(options) {
                const { title, message, type = 'warning', confirmText = '确认', cancelText = '取消', onConfirm, onCancel } = options;

                const dialog = document.createElement('div');
                dialog.className = 'confirm-dialog';
                dialog.id = 'confirm-dialog';
                dialog.innerHTML = `
                    <div class="dialog-content">
                        <div class="dialog-icon ${type}">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${this.getIcon(type)}
                            </svg>
                        </div>
                        <div class="dialog-title">${title}</div>
                        <div class="dialog-message">${message}</div>
                        <div class="dialog-actions">
                            <button class="btn btn-ghost" id="confirm-cancel">${cancelText}</button>
                            <button class="btn btn-${type === 'danger' ? 'danger' : 'primary'}" id="confirm-ok">${confirmText}</button>
                        </div>
                    </div>
                `;

                document.body.appendChild(dialog);

                const close = () => {
                    dialog.style.animation = 'fadeIn 0.2s ease reverse';
                    setTimeout(() => dialog.remove(), 200);
                };

                dialog.querySelector('#confirm-cancel').onclick = () => {
                    close();
                    if (onCancel) onCancel();
                };

                dialog.querySelector('#confirm-ok').onclick = () => {
                    close();
                    if (onConfirm) onConfirm();
                };

                dialog.onclick = (e) => {
                    if (e.target === dialog) {
                        close();
                        if (onCancel) onCancel();
                    }
                };
            },

            getIcon(type) {
                switch(type) {
                    case 'danger':
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>';
                    case 'success':
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
                    default:
                        return '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>';
                }
            },

            delete(title, message, onConfirm) {
                this.show({ title, message, type: 'danger', confirmText: '删除', onConfirm });
            }
        };

        // ============================================
        // Loading Overlay
        // ============================================
        const Loading = {
            overlay: null,

            init() {
                this.overlay = document.getElementById('loading-overlay');
            },

            show(text = '加载中...') {
                if (!this.overlay) this.init();
                this.overlay.querySelector('.loading-text').textContent = text;
                this.overlay.classList.add('active');
            },

            hide() {
                if (!this.overlay) this.init();
                this.overlay.classList.remove('active');

        // ============================================
        // Connection Status Monitor
        // ============================================
        const Connection = {
            indicator: null,

            init() {
                this.indicator = document.getElementById('connection-indicator');

                window.addEventListener('online', () => this.updateStatus(true));
                window.addEventListener('offline', () => this.updateStatus(false));
            },

            updateStatus(isOnline) {
                if (!this.indicator) this.init();

                if (isOnline) {
                    this.indicator.classList.add('online');
                    this.indicator.querySelector('span').textContent = '网络已恢复';
                    this.indicator.classList.add('show');

                    setTimeout(() => {
                        this.indicator.classList.remove('show');
                    }, 2000);
                } else {
                    this.indicator.classList.remove('online');
                    this.indicator.querySelector('span').textContent = '网络连接已断开';
                    this.indicator.classList.add('show');
                }
            }
        };

            const padding = document.getElementById('padding-slider').value;

            // Update display values
            document.getElementById('font-size-value').textContent = fontSize + 'px';
            document.getElementById('line-height-value').textContent = lineHeight.toFixed(1);
            document.getElementById('border-radius-value').textContent = borderRadius + 'px';
            document.getElementById('padding-value').textContent = padding + 'px';
            document.getElementById('transition-value').textContent = transition.toFixed(1) + 's';

            // Apply CSS variables (直接设置style.css中定义的变量)
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');

            document.documentElement.style.setProperty('--border-radius', borderRadius + 'px');
            document.documentElement.style.setProperty('--padding', padding + 'px');
            document.documentElement.style.setProperty('--transition', transition + 's');

            // Apply to body
            document.body.style.fontSize = fontSize + 'px';
            document.body.style.lineHeight = lineHeight;

            localStorage.setItem('designValues', JSON.stringify({

            const saved = localStorage.getItem('designValues');
            if (saved) {

        function copyDesignCSS() {
            const fontSize = document.getElementById('font-size-slider').value;
            const lineHeight = (document.getElementById('line-height-slider').value / 10).toFixed(1);
            const borderRadius = document.getElementById('border-radius-slider').value;
            const padding = document.getElementById('padding-slider').value;
            const transition = (document.getElementById('transition-slider').value / 10).toFixed(1);

            const css = `/* Design Parameters */
:root {
    --font-size: ${fontSize}px;
    --line-height: ${lineHeight};
    --border-radius: ${borderRadius}px;
    --padding: ${padding}px;
    --transition: ${transition}s;
}

body {
    font-size: ${fontSize}px;
    line-height: ${lineHeight};
}

.card, .data-card {
    border-radius: ${borderRadius}px;
    padding: ${padding}px;
}

* {
    transition-duration: ${transition}s;
}`;

            navigator.clipboard.writeText(css).then(() => {
                Toast.success('CSS参数已复制到剪贴板');
            }).catch(() => {
                Toast.error('复制失败，请手动复制');

        function resetDesign() {
            document.getElementById('font-size-slider').value = 14;
            document.getElementById('line-height-slider').value = 15;
            document.getElementById('border-radius-slider').value = 12;
            document.getElementById('padding-slider').value = 16;
            document.getElementById('transition-slider').value = 3;
            updateDesign();
            Toast.info('设计参数已重置');
        }

        function setShowDesignAdjuster(show) {
            const adjuster = document.getElementById('design-adjuster');
            if (show) {
                adjuster.style.display = 'flex';
            } else {
                adjuster.style.display = 'none';
            }
            localStorage.setItem('showDesignAdjuster', show);
        }

        /* 复制到剪贴板功能 */
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 800);
            }).catch(err => {
                console.error('复制失败:', err);
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✓';
                setTimeout(() => { btn.textContent = '复制'; }, 800);
            });
        }
    </script>
</body>

</html>
